<title>Media Manager</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="icon" type="image/png" href="/static/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Media Manager">
<meta name="theme-color" content="#0b0d12">
<style>
  :root {
    color-scheme: dark;
    --bg:#0b0d12; --p1:#0e1218; --p2:#10141c; --p3:#12161f; --in1:#0b0e14; --in2:#0d1015;
    --hair:#161b25; --bd:#1c2230; --ctl:#232a38; --btn2:#2c3648;
    --tx:#dfe5ee; --body:#c9d2e0; --mut:#8a94a6; --faint:#5b6577; --ghost:#4a5568;
    --acc:#8fb8d8; --shr:#e8c268; --fine:#7fc9a8; --dup:#b48ead; --err:#ff5d5d;
    --accBd:rgba(143,184,216,.35); --accBg:rgba(143,184,216,.08);
    --shrBd:rgba(232,194,104,.4); --shrBg:rgba(232,194,104,.13);
    --fineBd:rgba(127,201,168,.35); --fineBg:rgba(127,201,168,.1);
    --dupBd:rgba(180,142,173,.45); --errBd:rgba(255,93,93,.3);
    --mono:ui-monospace,'SF Mono',Menlo,monospace;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--tx); font-family:-apple-system,system-ui,sans-serif; font-size:13px; }
  button { font:inherit; cursor:pointer; background:none; border:none; color:inherit; padding:0; }
  input, select { font:inherit; background:var(--p3); color:var(--tx); border:1px solid var(--ctl); border-radius:6px; padding:6px 10px; outline:none; }
  input:focus, select:focus { border-color:var(--acc); }
  ::placeholder { color:var(--faint); }
  .mono { font-family:var(--mono); }
  .lbl { font:600 10px var(--mono); letter-spacing:.12em; color:var(--faint); text-transform:uppercase; }

  /* glow — everything behind one class on <body> so it can be disabled */
  body.glow .g-acc { box-shadow:0 0 8px rgba(143,184,216,.5); }
  body.glow .g-acc-lg { box-shadow:0 0 14px rgba(143,184,216,.5); }
  body.glow .g-acc-panel { box-shadow:0 0 20px rgba(143,184,216,.08); }
  body.glow .g-shr { box-shadow:0 0 16px rgba(232,194,104,.3); }
  body.glow .g-shr-badge { box-shadow:0 0 12px rgba(232,194,104,.45), inset 0 0 0 1px rgba(232,194,104,.6); }
  body.glow .g-fine-badge { box-shadow:inset 0 0 0 1px rgba(127,201,168,.35); }
  body.glow .g-fine { box-shadow:0 0 16px rgba(127,201,168,.45); }
  body.glow .g-fine-dot { box-shadow:0 0 6px rgba(127,201,168,.4); }
  body.glow .g-txt-fine { text-shadow:0 0 8px rgba(127,201,168,.4); }

  /* ---------- header ---------- */
  header { display:flex; align-items:center; gap:16px; padding:14px 22px; border-bottom:1px solid var(--hair); }
  header .brand { font-size:15px; font-weight:700; letter-spacing:.02em; cursor:pointer; white-space:nowrap; }
  header .search { flex:1; max-width:340px; display:flex; align-items:center; gap:8px; background:var(--p3); border:1px solid var(--ctl); border-radius:8px; padding:0 14px; }
  header .search span { color:var(--ghost); }
  header .search input { flex:1; background:none; border:none; padding:8px 0; }
  header .hbtns { margin-left:auto; display:flex; gap:8px; align-items:center; position:relative; }
  .hbtn { font-size:12px; color:var(--mut); border:1px solid var(--ctl); border-radius:8px; padding:7px 12px; transition:background .12s ease-out; }
  .hbtn:hover { background:rgba(255,255,255,.04); }
  .power-pill { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--acc); border:1px solid var(--accBd); border-radius:8px; padding:7px 12px; }
  .power-pill .dot { width:7px; height:7px; border-radius:50%; background:var(--acc); }
  .pop { position:absolute; top:calc(100% + 8px); right:0; z-index:30; background:var(--p2); border:1px solid var(--bd); border-radius:10px; padding:12px; min-width:220px; display:flex; flex-direction:column; gap:8px; box-shadow:0 8px 30px rgba(0,0,0,.5); }
  .pop button { text-align:left; font-size:12px; color:var(--mut); border:1px solid var(--ctl); border-radius:6px; padding:8px 11px; }
  .pop button.on { color:var(--acc); border-color:var(--accBd); background:var(--accBg); }

  /* ---------- dashboard ---------- */
  .dash { display:flex; align-items:stretch; margin:16px 22px; background:linear-gradient(135deg,var(--p2),#0d1017); border:1px solid var(--bd); border-radius:12px; overflow:hidden; }
  .dash .ringzone { display:flex; align-items:center; gap:16px; padding:16px 22px; border-right:1px solid var(--hair); flex:none; }
  .ring { position:relative; width:72px; height:72px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex:none; }
  .ring .inner { width:56px; height:56px; border-radius:50%; background:var(--in2); display:flex; align-items:center; justify-content:center; font:700 14px var(--mono); color:var(--fine); }
  .dash .stats { flex:1; display:grid; grid-template-columns:repeat(4,1fr); }
  .dash .cell { padding:14px 18px; border-right:1px solid var(--hair); min-width:0; }
  .dash .cell:last-child { border-right:none; }
  .dash .val { font:600 19px var(--mono); margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .dash .sub { font-size:12px; color:var(--faint); }
  .jobbar { height:3px; background:#1a202c; border-radius:2px; margin-top:7px; overflow:hidden; }
  .jobbar > div { height:100%; background:var(--acc); }

  /* ---------- tabs ---------- */
  .tabs { display:flex; gap:6px; align-items:center; margin:0 22px; padding-bottom:12px; border-bottom:1px solid var(--hair); font:11px var(--mono); flex-wrap:nowrap; overflow-x:auto; }
  .tab { padding:6px 13px; border-radius:6px; border:1px solid var(--ctl); color:var(--mut); white-space:nowrap; transition:background .12s ease-out; }
  .tab.on { background:var(--shrBg); border-color:var(--shrBd); color:var(--shr); }
  .tabs .right { margin-left:auto; color:var(--faint); display:flex; gap:10px; align-items:center; white-space:nowrap; }
  .tabs .right select { font:11px var(--mono); padding:4px 6px; background:none; border:none; color:var(--faint); }
  .tabs .right label { cursor:pointer; }

  /* ---------- grid ---------- */
  .grid { display:grid; grid-template-columns:repeat(6,1fr); gap:14px; padding:18px 22px 22px; }
  .mcard { position:relative; border-radius:10px; overflow:hidden; border:1px solid var(--bd); background:var(--p3); cursor:pointer; transition:border-color .12s ease-out; }
  .mcard.shrink { border-color:var(--shrBd); }
  .mcard:hover { border-color:var(--acc); }
  .mcard.shrink:hover { border-color:var(--shr); }
  .mcard .poster { aspect-ratio:2/3; width:100%; object-fit:cover; display:block; background:linear-gradient(160deg,hsl(215 28% 22%),hsl(215 35% 9%)); }
  .mcard .noposter { aspect-ratio:2/3; display:flex; align-items:center; justify-content:center; font:10px var(--mono); color:rgba(255,255,255,.3); letter-spacing:.1em; text-align:center; padding:10px; background:linear-gradient(160deg,hsl(215 28% 22%),hsl(215 35% 9%)),repeating-linear-gradient(45deg,rgba(255,255,255,.04) 0 6px,transparent 6px 12px); }
  .adv-badge { position:absolute; top:8px; left:8px; font:700 10px var(--mono); letter-spacing:.08em; background:rgba(10,11,15,.9); border-radius:4px; padding:3px 7px; }
  .adv-badge.shrink { color:var(--shr); }
  .adv-badge.fine { color:var(--fine); }
  .dup-badge { position:absolute; top:8px; right:8px; font:700 9px var(--mono); color:var(--dup); background:rgba(15,8,14,.85); border:1px solid var(--dupBd); border-radius:4px; padding:2px 6px; }
  .mcard .prog { position:absolute; left:0; right:0; height:3px; background:rgba(26,32,44,.9); }
  .mcard .prog > div { height:100%; background:var(--acc); }
  .mcard .foot { padding:8px 10px 9px; background:linear-gradient(180deg,var(--p3),#0e1219); }
  .mcard .t { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mcard .row2 { display:flex; justify-content:space-between; margin-top:3px; font:11px var(--mono); color:var(--faint); }
  .mcard .spec { font:10px var(--mono); color:var(--faint); margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* ---------- detail ---------- */
  .dwrap { max-width:960px; margin:0 auto; }
  .dtop { display:flex; align-items:center; gap:14px; padding:12px 22px; border-bottom:1px solid var(--hair); }
  .dtop .back { font-size:13px; color:var(--acc); cursor:pointer; }
  .stpill { margin-left:auto; display:flex; align-items:center; gap:6px; font:10px var(--mono); }
  .stpill .dot { width:6px; height:6px; border-radius:50%; }
  .ident { display:flex; gap:18px; padding:18px 22px 4px; }
  .ident img, .ident .noposter { width:110px; aspect-ratio:2/3; border-radius:8px; flex:none; object-fit:cover; }
  .ident .noposter { display:flex; align-items:center; justify-content:center; font:9px var(--mono); color:rgba(255,255,255,.3); background:linear-gradient(160deg,hsl(215 28% 22%),hsl(215 35% 9%)); }
  .ident h2 { margin:0; font-size:19px; font-weight:700; }
  .ident h2 .yr { color:var(--faint); font-weight:400; }
  .ident .fn { font:11px var(--mono); color:var(--faint); margin-top:4px; word-break:break-all; }
  .spec-chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; font:10px var(--mono); }
  .schip { border:1px solid var(--ctl); border-radius:4px; padding:3px 7px; color:var(--mut); }
  .schip.acc { border-color:var(--accBd); color:var(--acc); }
  .schip.shr { border-color:var(--shrBd); color:var(--shr); }
  .duprow { font-size:11px; color:var(--faint); margin-top:8px; }
  .duprow a { color:var(--dup); cursor:pointer; }

  .steps { padding:14px 22px 22px; display:flex; flex-direction:column; gap:10px; }
  .stepc { border:1px solid var(--bd); border-radius:10px; background:var(--p1); overflow:hidden; }
  .stepc.active { border-color:var(--accBd); }
  .stepc.pending { opacity:.55; }
  .step-head { display:flex; align-items:center; gap:12px; padding:10px 14px; }
  .stepc.open .step-head, .stepc.active .step-head { border-bottom:1px solid var(--hair); }
  .stepc .disc { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex:none; background:#2a2e37; color:var(--mut); }
  .stepc.done .disc { background:var(--fine); color:var(--bg); }
  .stepc.active .disc { background:var(--acc); color:var(--bg); }
  .stepc .st { font-size:13px; font-weight:600; }
  .stepc .ssum { font-size:12px; color:var(--faint); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .stepc .sact { margin-left:auto; font-size:11px; color:var(--mut); border:1px solid var(--ctl); border-radius:6px; padding:4px 9px; white-space:nowrap; }
  .step-body { padding:12px 14px; }
  .stepc.done:not(.open) .step-body, .stepc.pending .step-body { display:none; }
  .stepc.done .step-head { cursor:pointer; }
  .stepc.done:not(.open) .step-head { border-bottom:none; }

  /* track rows */
  .trow { display:flex; align-items:center; gap:10px; padding:8px 12px; background:var(--p2); border:1px solid var(--bd); border-radius:8px; margin-top:6px; }
  .trow.drop { opacity:.45; }
  .updown { display:flex; flex-direction:column; gap:3px; flex:none; }
  .updown button { width:24px; height:17px; border:1px solid var(--ctl); border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:8px; color:var(--mut); }
  .updown button:hover { color:var(--tx); border-color:var(--btn2); }
  .keep-pill { font:700 9px var(--mono); letter-spacing:.08em; border-radius:4px; padding:4px 8px; flex:none; }
  .keep-pill.on { color:var(--fine); background:var(--fineBg); border:1px solid var(--fineBd); }
  .keep-pill.off { color:var(--mut); background:none; border:1px solid var(--btn2); }
  .trow .cinfo { width:170px; flex:none; min-width:0; }
  .trow .cinfo .cc { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .trow .cinfo .cm { font:10px var(--mono); color:var(--faint); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .trow select.lang { font:10px var(--mono); color:var(--mut); border:1px solid var(--ctl); border-radius:4px; padding:4px 6px; background:none; flex:none; }
  .fchip { font:700 9px var(--mono); border-radius:4px; padding:4px 7px; flex:none; letter-spacing:.02em; }
  .fchip.def { color:var(--acc); border:1px solid var(--accBd); }
  .fchip.forc { color:var(--shr); border:1px solid var(--shrBd); }
  .fchip.dim { opacity:.3; border-color:var(--ctl); color:var(--mut); }
  .trow input.nm { flex:1; min-width:0; font:11px var(--mono); color:var(--mut); background:var(--in1); border:1px solid var(--bd); border-radius:5px; padding:6px 9px; }

  .btnrow { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .btn { font-size:12px; color:var(--mut); border:1px solid var(--ctl); border-radius:7px; padding:7px 13px; transition:background .12s ease-out; }
  .btn:hover { background:rgba(255,255,255,.04); }
  .btn.primary { font-weight:600; color:var(--bg); background:var(--acc); border-color:var(--acc); }
  .btn.gold { font-size:12.5px; font-weight:700; color:var(--bg); background:var(--shr); border-color:var(--shr); padding:9px 16px; }
  .btn.ghost2 { font-size:12.5px; font-weight:600; color:var(--body); border:1px solid var(--btn2); padding:9px 14px; }
  .btn.fine { font-size:12.5px; font-weight:600; color:var(--fine); border:1px solid var(--fineBd); padding:9px 14px; }
  .btn.danger { color:var(--err); border:1px solid var(--errBd); }
  .btn:disabled { opacity:.4; cursor:default; }
  .linky { font-size:12px; color:var(--faint); padding:9px 4px; cursor:pointer; }
  .linky:hover { color:var(--mut); }

  .advbanner { display:flex; align-items:center; gap:10px; border-radius:8px; padding:10px 14px; font-size:12.5px; flex-wrap:wrap; }
  .advbanner.shrink { background:var(--shrBg); border:1px solid var(--shrBd); }
  .advbanner.fine { background:var(--fineBg); border:1px solid var(--fineBd); }
  .advbanner b.s { color:var(--shr); } .advbanner b.f { color:var(--fine); }
  .advbanner span { color:var(--body); }

  /* RF chart */
  .rfpanel { margin-top:14px; border:1px solid var(--bd); border-radius:10px; background:var(--in1); padding:14px 16px; }
  .rfhead { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .rfhead .src { margin-left:auto; font:11px var(--mono); color:var(--faint); }
  .rfhead input { width:56px; font-size:11px; padding:4px 8px; border-radius:6px; }
  .rfcols { display:flex; gap:14px; align-items:flex-end; margin-top:14px; height:150px; overflow-x:auto; }
  .rfcol { flex:1; min-width:64px; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; gap:5px; height:100%; cursor:pointer; }
  .rfcol .recl { font:700 8px var(--mono); letter-spacing:.1em; color:var(--fine); }
  .rfcol .sz { font:600 12px var(--mono); color:var(--mut); }
  .rfcol .pct { font:10px var(--mono); color:var(--faint); }
  .rfcol .bar { width:100%; border-radius:6px 6px 2px 2px; background:rgba(143,184,216,.28); border:1px solid transparent; }
  .rfcol.rec .bar { background:linear-gradient(180deg,var(--fine),rgba(127,201,168,.45)); border-color:rgba(127,201,168,.55); }
  .rfcol.rec .sz { color:var(--fine); }
  .rfcol.sel .bar { border-color:var(--acc); }
  .rflabels { display:flex; gap:14px; margin-top:8px; overflow-x:auto; }
  .rflab { flex:1; min-width:64px; text-align:center; }
  .rflab .rf { font:700 11px var(--mono); color:var(--mut); }
  .rflab.rec .rf { color:var(--fine); }
  .rflab .tag { font:9px var(--mono); color:var(--faint); letter-spacing:.06em; margin-top:2px; }
  .rflab .lnk { font-size:10px; margin-top:5px; color:var(--faint); }
  .rflab .lnk a { color:var(--acc); cursor:pointer; text-decoration:none; }
  .rflab .lnk span.x { cursor:pointer; }
  .qaxis { height:5px; border-radius:3px; margin-top:14px; background:linear-gradient(90deg,var(--fine),var(--shr),var(--err)); }
  .qlbl { display:flex; justify-content:space-between; font:9px var(--mono); color:var(--faint); letter-spacing:.08em; margin-top:5px; }

  pre.cmd { background:var(--in1); border:1px solid var(--bd); border-radius:8px; padding:10px 12px; font:11px var(--mono); overflow-x:auto; white-space:pre-wrap; word-break:break-all; color:var(--mut); margin:10px 0 0; }

  /* job progress in step 3 */
  .jprog { margin-top:12px; }
  .jprog .row { display:flex; align-items:baseline; gap:10px; font:600 13px var(--mono); color:var(--acc); }
  .jprog .eta { font:11px var(--mono); color:var(--faint); font-weight:400; }
  .jprog .bar { height:6px; background:#1a202c; border-radius:3px; margin-top:8px; overflow:hidden; }
  .jprog .bar > div { height:100%; background:var(--acc); }

  /* tmdb candidates */
  .cand { display:flex; gap:10px; align-items:center; padding:8px 10px; border:1px solid var(--bd); border-radius:8px; margin-top:6px; cursor:pointer; background:var(--p2); }
  .cand:hover { border-color:var(--acc); }
  .cand img { width:40px; border-radius:4px; }
  .cand .cl { color:var(--faint); font-size:11px; }

  /* ---------- modal ---------- */
  .mback { position:fixed; inset:0; background:rgba(4,5,8,.7); z-index:50; display:flex; align-items:center; justify-content:center; padding:20px; }
  .mpanel { background:var(--p2); border:1px solid var(--bd); border-radius:12px; max-width:480px; width:100%; max-height:80vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 12px 50px rgba(0,0,0,.6); }
  .mpanel.danger { border-color:var(--errBd); }
  .mhead { padding:14px 18px; font-size:14px; font-weight:700; border-bottom:1px solid var(--hair); }
  .mpanel.danger .mhead { background:rgba(255,93,93,.08); color:var(--err); }
  .mbody { padding:14px 18px; overflow-y:auto; font-size:12.5px; color:var(--body); line-height:1.5; }
  .mbody .files { font:11px var(--mono); color:var(--mut); background:var(--in1); border:1px solid var(--bd); border-radius:8px; padding:10px; max-height:200px; overflow-y:auto; margin-top:10px; white-space:pre-wrap; word-break:break-all; }
  .mbody input { width:100%; margin-top:10px; font-family:var(--mono); }
  .mfoot { padding:12px 18px; display:flex; gap:8px; justify-content:flex-end; border-top:1px solid var(--hair); }
  .holdbtn { position:relative; overflow:hidden; }
  .holdbtn .fill { position:absolute; inset:0; width:0%; background:rgba(255,93,93,.25); transition:none; }
  .holdbtn.fine .fill { background:rgba(127,201,168,.25); }

  /* toast */
  #toasts { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); z-index:60; display:flex; flex-direction:column; gap:8px; width:min(480px,92vw); }
  .toast { background:var(--p2); border:1px solid var(--errBd); border-radius:8px; padding:10px 14px; font:12px var(--mono); color:var(--err); cursor:pointer; word-break:break-word; }

  .skel { background:var(--p2); border-radius:10px; animation:pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:.9} }
  .empty { padding:40px; text-align:center; color:var(--faint); font:12px var(--mono); letter-spacing:.08em; }

  /* ---------- mobile ---------- */
  @media (max-width:700px) {
    header { gap:10px; padding:12px 14px; flex-wrap:wrap; }
    header .search { max-width:none; order:3; flex-basis:100%; }
    .dash { flex-direction:column; margin:12px 14px; }
    .dash .ringzone { border-right:none; border-bottom:1px solid var(--hair); }
    .dash .stats { grid-template-columns:repeat(2,1fr); }
    .dash .cell:nth-child(2) { border-right:none; }
    .dash .cell { border-bottom:1px solid var(--hair); }
    .dash .cell:nth-child(3), .dash .cell:nth-child(4) { border-bottom:none; }
    .tabs { margin:0 14px; }
    .grid { grid-template-columns:repeat(3,1fr); gap:10px; padding:14px; }
    .mcard .spec { display:none; }
    .mcard .row2 span:first-child { display:none; }
    .dtop, .ident { padding-left:14px; padding-right:14px; }
    .steps { padding:12px 14px 18px; }
    .trow { flex-wrap:wrap; }
    .trow input.nm { flex-basis:100%; order:9; }
    .updown button, .keep-pill, .fchip { min-height:28px; }
    .btn, .hbtn { min-height:44px; display:inline-flex; align-items:center; }
    .keep-pill, .fchip, .updown button { min-height:32px; }
    .mback { align-items:flex-end; padding:0; }
    .mpanel { max-width:none; border-radius:12px 12px 0 0; }
  }
</style>
<body class="glow">
<div id="page"></div>
<div id="modal-root"></div>
<div id="toasts"></div>

<script>
// ---------- utils ----------
const api = (path, opts) => fetch(path, opts).then(async r => {
  if (!r.ok) { const t = await r.text(); throw new Error(t || r.statusText); }
  return r.status === 204 ? null : r.json();
});
const esc = s => (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const posterUrl = p => p ? `https://image.tmdb.org/t/p/w342${p}` : null;
const fmtG = b => !b ? '' : (b / 1e9 >= 1 ? (b / 1e9).toFixed(1) + ' G' : (b / 1e6).toFixed(0) + ' M');
const fmtTB = b => b >= 1e12 ? (b / 1e12).toFixed(2) + ' TB' : (b / 1e9).toFixed(0) + ' GB';
const resOf = m => m.height ? (m.height >= 2000 ? '4K' : m.height >= 1000 ? '1080p' : m.height + 'p') : '';
const barFor = m => (m.height || 0) >= 2000 ? 25 : (m.height || 0) >= 1000 ? 15 : 8;
const KIND_LABEL = { remux: 'Quick Remux', encode: 'Heavy Encode', sample: 'Sample' };
const INFLIGHT = ['cleaning', 'encoding', 'working'];

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  el.onclick = () => el.remove();
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 8000);
}
const oops = e => toast(e.message || String(e));

// ---------- modal ----------
// modal({title, html, confirmLabel, mode:'plain'|'typed'|'hold', expect, danger, holdClass}) -> Promise<bool>
function modal(o) {
  return new Promise(resolve => {
    const root = document.getElementById('modal-root');
    const typed = o.mode === 'typed';
    root.innerHTML = `<div class="mback">
      <div class="mpanel ${o.danger ? 'danger' : ''}">
        <div class="mhead">${esc(o.title)}</div>
        <div class="mbody">${o.html || ''}${typed ? `<input id="mtyped" placeholder="type: ${esc(o.expect)}" autocomplete="off">` : ''}</div>
        <div class="mfoot">
          <button class="btn" id="mcancel">Cancel</button>
          <button class="btn ${o.danger ? 'danger' : 'fine'} ${o.mode === 'hold' ? 'holdbtn' + (o.danger ? '' : ' fine') : ''}" id="mok" ${typed ? 'disabled' : ''} style="padding:7px 16px">
            ${o.mode === 'hold' ? '<span class="fill"></span>' : ''}<span style="position:relative">${esc(o.confirmLabel || 'Confirm')}</span>
          </button>
        </div>
      </div></div>`;
    const done = v => { root.innerHTML = ''; resolve(v); };
    root.querySelector('.mback').onclick = e => { if (e.target === e.currentTarget) done(false); };
    document.getElementById('mcancel').onclick = () => done(false);
    const ok = document.getElementById('mok');
    if (typed) {
      const inp = document.getElementById('mtyped');
      inp.oninput = () => { ok.disabled = inp.value.trim() !== o.expect; };
      inp.focus();
      ok.onclick = () => done(true);
    } else if (o.mode === 'hold') {
      // hold 0.8s to confirm — fill animates via rAF
      let t0 = null, raf = null;
      const fill = ok.querySelector('.fill');
      const step = ts => {
        if (!t0) t0 = ts;
        const p = Math.min(1, (ts - t0) / 800);
        fill.style.width = (p * 100) + '%';
        if (p >= 1) { done(true); return; }
        raf = requestAnimationFrame(step);
      };
      const start = e => { e.preventDefault(); t0 = null; raf = requestAnimationFrame(step); };
      const stop = () => { cancelAnimationFrame(raf); fill.style.width = '0%'; };
      ok.onmousedown = start; ok.ontouchstart = start;
      ok.onmouseup = ok.onmouseleave = ok.ontouchend = stop;
    } else {
      ok.onclick = () => done(true);
    }
  });
}

// ---------- state ----------
let MOVIES = [], JOBS = [], POWER = null, STATS = { reclaimed_bytes: 0 };
let TAB = 'needs', SORT = 'size', DUPONLY = false, Q = '';
let SCAN = { running: false };
let TRACKSTATE = null;   // {audio:[], subs:[]} while a detail page is open
let SELRF = null, SAMPLES = [], CURID = null, VIDEOTRACK = null;
let powerPopOpen = false, maintPopOpen = false;

// ---------- routing ----------
window.onhashchange = route;
window.onload = () => {
  route();
  pollJobs(); setInterval(pollJobs, 3000);
  api('/api/power').then(p => { POWER = p; paintHeaderPower(); }).catch(() => {});
  api('/api/stats').then(s => { STATS = s; if (!CURID) paintDash(); }).catch(() => {});
};
function route() {
  const m = location.hash.match(/^#\/movie\/(\d+)/);
  powerPopOpen = maintPopOpen = false;
  if (m) { CURID = parseInt(m[1]); renderDetail(CURID); }
  else { CURID = null; TRACKSTATE = null; renderHome(); }
}

// ---------- header ----------
function headerHtml() {
  return `<header>
    <div class="brand" onclick="location.hash=''">Media Manager</div>
    <div class="search"><span>⌕</span><input id="q" placeholder="Search library" value="${esc(Q)}" oninput="qChanged(this.value)"></div>
    <div class="hbtns">
      <button class="hbtn" onclick="doScan()">⟳ Scan</button>
      <button class="hbtn" onclick="toggleMaint(event)">Maintenance ▾</button>
      <button class="power-pill" onclick="togglePower(event)"><span class="dot g-acc"></span><span id="powerlbl">${powerLabel()}</span></button>
      <div class="pop" id="maintpop" style="display:${maintPopOpen ? 'flex' : 'none'}">
        <button onclick="doCleanupJunk()">Purge junk files…</button>
      </div>
      <div class="pop" id="powerpop" style="display:${powerPopOpen ? 'flex' : 'none'}">
        <div class="lbl">CPU for encode jobs</div>
        <button class="${POWER?.mode === 'auto' ? 'on' : ''}" onclick="setPowerMode('auto')">⚡ Auto — follows work hours</button>
        <button class="${POWER?.mode === 'full' ? 'on' : ''}" onclick="setPowerMode('full')">⚡ Full power</button>
        <button class="${POWER?.mode === 'throttle' ? 'on' : ''}" onclick="setPowerMode('throttle')">🐢 Throttle</button>
        ${POWER?.mode === 'auto' ? `<div style="display:flex;gap:8px;align-items:center"><span class="lbl">Hours</span>
          <input id="workHours" value="${esc(POWER?.work_hours || '')}" style="width:80px;font-family:var(--mono);font-size:12px" onchange="setWorkHours(this.value)"></div>` : ''}
      </div>
    </div>
  </header>`;
}
function powerLabel() {
  if (!POWER) return 'Power';
  if (POWER.mode === 'full') return 'Full power';
  if (POWER.mode === 'throttle') return 'Throttled';
  const [a, b] = (POWER.work_hours || '9-23').split('-');
  return `Auto power · ${String(a).padStart(2, '0')}–${String(b).padStart(2, '0')}`;
}
function paintHeaderPower() { const el = document.getElementById('powerlbl'); if (el) el.textContent = powerLabel(); }
function togglePower(e) { e.stopPropagation(); powerPopOpen = !powerPopOpen; maintPopOpen = false; syncPops(); }
function toggleMaint(e) { e.stopPropagation(); maintPopOpen = !maintPopOpen; powerPopOpen = false; syncPops(); }
function syncPops() {
  const pp = document.getElementById('powerpop'), mp = document.getElementById('maintpop');
  if (pp) pp.style.display = powerPopOpen ? 'flex' : 'none';
  if (mp) mp.style.display = maintPopOpen ? 'flex' : 'none';
}
document.addEventListener('click', () => { if (powerPopOpen || maintPopOpen) { powerPopOpen = maintPopOpen = false; syncPops(); } });
async function setPowerMode(mode) {
  POWER = await api('/api/power', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ mode }) }).catch(oops) || POWER;
  powerPopOpen = true; repaintHeader();
}
async function setWorkHours(v) {
  POWER = await api('/api/power', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ work_hours: v }) }).catch(oops) || POWER;
  powerPopOpen = true; repaintHeader();
}
function repaintHeader() {
  const old = document.querySelector('header');
  if (!old) return;
  const tmp = document.createElement('div'); tmp.innerHTML = headerHtml();
  old.replaceWith(tmp.firstElementChild);
}

let qTimer;
function qChanged(v) { Q = v; clearTimeout(qTimer); qTimer = setTimeout(() => loadMovies().then(paintHomeBody), 250); }

// ---------- home ----------
async function renderHome() {
  document.getElementById('page').innerHTML = headerHtml() + `
    <div id="dash"></div><div id="tabs"></div><div id="gridwrap"><div class="grid">${'<div class="skel" style="aspect-ratio:2/3.4"></div>'.repeat(12)}</div></div>`;
  await loadMovies();
  paintHomeBody();
}
async function loadMovies() {
  const params = new URLSearchParams();
  if (Q) params.set('q', Q);
  MOVIES = await api('/api/movies?' + params).catch(e => { oops(e); return MOVIES; });
}
function paintHomeBody() { if (CURID) return; paintDash(); paintTabs(); paintGrid(); }

function bucketOf(m) {
  if (INFLIGHT.includes(m.status)) return 'flight';
  if (m.status === 'clean') return 'done';
  if (m.advice === 'encode') return 'needs';
  return 'other';
}
function paintDash() {
  const el = document.getElementById('dash');
  if (!el) return;
  const total = MOVIES.length;
  const totalB = MOVIES.reduce((a, m) => a + (m.size_bytes || 0), 0);
  const done = MOVIES.filter(m => m.status === 'clean').length;
  const queue = MOVIES.filter(m => bucketOf(m) === 'needs');
  // ponytail: 0.72 savings factor = observed x265 shrink on this library's remuxes
  const onTable = queue.reduce((a, m) => a + (m.size_bytes || 0), 0) * 0.72;
  const pct = total ? Math.round(100 * done / total) : 0;
  const deg = Math.round(360 * pct / 100);
  const running = JOBS.find(j => j.status === 'running');
  const queued = JOBS.filter(j => j.status === 'queued').length;
  let jobCell;
  if (SCAN.running) {
    jobCell = `<div class="val" style="font-size:13px;color:var(--acc)">SCAN ${SCAN.done}/${SCAN.total}</div>
      <div class="sub mono" style="font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(SCAN.current || '')}</div>`;
  } else if (running) {
    const nm = (running.movie_title || '').replace(/\s*\(\d{4}\)$/, '').toUpperCase();
    jobCell = `<div style="display:flex;align-items:baseline;gap:8px;margin-top:4px;min-width:0">
        <span class="mono" style="font-weight:600;font-size:13px;color:var(--acc);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(nm)} · ${(running.progress || 0).toFixed(0)}%</span>
        ${running.eta ? `<span class="mono" style="font-size:11px;color:var(--faint)">ETA ${esc(running.eta.toUpperCase())}</span>` : ''}</div>
      <div class="jobbar"><div class="g-acc" style="width:${running.progress || 0}%"></div></div>
      ${queued ? `<div class="sub mono" style="font-size:10px;margin-top:4px">+${queued} QUEUED</div>` : ''}`;
  } else {
    jobCell = `<div class="val" style="color:var(--faint)">idle</div>`;
  }
  el.innerHTML = `<div class="dash">
    <div class="ringzone">
      <div class="ring" style="background:conic-gradient(var(--fine) 0 ${deg}deg,#1a202c ${deg}deg 360deg)"><div class="inner">${pct}%</div></div>
      <div>
        <div style="font-size:14px;font-weight:600">${done} of ${total} triaged</div>
        <div style="font-size:12px;color:var(--mut);margin-top:3px"><span style="color:var(--shr);font-weight:600">~${fmtTB(onTable)}</span> still on the table</div>
      </div>
    </div>
    <div class="stats">
      <div class="cell"><div class="lbl">Reclaimed</div><div class="val" style="color:var(--fine)">${STATS.reclaimed_bytes ? fmtTB(STATS.reclaimed_bytes) : '0 GB'}</div></div>
      <div class="cell"><div class="lbl">Library</div><div class="val">${fmtTB(totalB)}<span style="font-size:12px;color:var(--faint)"> · ${total}</span></div></div>
      <div class="cell"><div class="lbl">Shrink queue</div><div class="val" style="color:var(--shr)">${queue.length}<span style="font-size:12px;color:var(--faint)"> files</span></div></div>
      <div class="cell"><div class="lbl">Active job</div>${jobCell}</div>
    </div>
  </div>`;
}
function paintTabs() {
  const el = document.getElementById('tabs');
  if (!el) return;
  const counts = { needs: 0, flight: 0, done: 0 };
  MOVIES.forEach(m => { const b = bucketOf(m); if (counts[b] !== undefined) counts[b]++; });
  const t = (id, label, n) => `<button class="tab ${TAB === id ? 'on' : ''}" onclick="TAB='${id}';paintTabs();paintGrid()">${label} ${n}</button>`;
  el.innerHTML = `<div class="tabs">
    ${t('needs', 'NEEDS DECISION', counts.needs)}${t('flight', 'IN FLIGHT', counts.flight)}${t('done', 'DONE', counts.done)}${t('all', 'ALL', MOVIES.length)}
    <div class="right">
      <span>SORT:</span><select onchange="SORT=this.value;paintGrid()">
        <option value="size" ${SORT === 'size' ? 'selected' : ''}>SIZE ▾</option>
        <option value="title" ${SORT === 'title' ? 'selected' : ''}>TITLE</option></select>
      <label>DUP <input type="checkbox" ${DUPONLY ? 'checked' : ''} onchange="DUPONLY=this.checked;paintGrid()"></label>
    </div></div>`;
}
function paintGrid() {
  const el = document.getElementById('gridwrap');
  if (!el) return;
  let ms = MOVIES.filter(m => TAB === 'all' || bucketOf(m) === TAB);
  if (DUPONLY) ms = ms.filter(m => m.dup);
  ms.sort(SORT === 'size' ? (a, b) => (b.size_bytes || 0) - (a.size_bytes || 0)
                          : (a, b) => (a.title || a.clean_title || a.folder).localeCompare(b.title || b.clean_title || b.folder));
  el.innerHTML = ms.length ? `<div class="grid">${ms.map(cardHtml).join('')}</div>` : '<div class="empty">NOTHING HERE</div>';
}
function cardHtml(m) {
  const title = m.title || m.clean_title || m.folder;
  const poster = posterUrl(m.poster_path);
  const res = resOf(m);
  const shrink = m.advice === 'encode' && m.status !== 'clean';
  const job = JOBS.find(j => j.movie_id === m.id && j.status === 'running');
  const specBits = [res, (m.video_codec || '').toUpperCase(), m.hdr && m.hdr !== 'SDR' ? m.hdr : null,
                    m.bitrate ? Math.round(m.bitrate / 1e6) + 'Mbps' : null].filter(Boolean);
  return `<div class="mcard ${shrink ? 'shrink' : ''}" onclick="location.hash='#/movie/${m.id}'">
    ${poster ? `<img class="poster" src="${poster}" loading="lazy">` : `<div class="noposter">${esc(title)}</div>`}
    ${m.status !== 'clean' && m.advice ? `<div class="adv-badge ${shrink ? 'shrink g-shr-badge' : 'fine g-fine-badge'}">${shrink ? 'SHRINK' : 'FINE'}</div>` : ''}
    ${m.dup ? '<div class="dup-badge">DUP</div>' : ''}
    ${job ? `<div class="prog" style="bottom:${document.body.clientWidth <= 700 ? 40 : 58}px"><div class="g-acc" style="width:${job.progress || 0}%"></div></div>` : ''}
    <div class="foot">
      <div class="t">${esc(title)}</div>
      <div class="row2"><span>${res}${m.hdr && m.hdr !== 'SDR' ? ' ' + m.hdr : ''}</span><span style="color:${shrink ? 'var(--shr)' : 'var(--faint)'}">${fmtG(m.size_bytes)}</span></div>
      <div class="spec">${m.status === 'error' ? '<span style="color:var(--err)">ERROR · </span>' : ''}${INFLIGHT.includes(m.status) ? `<span style="color:var(--acc)">${m.status.toUpperCase()} · </span>` : ''}${specBits.join(' · ')}</div>
    </div></div>`;
}

// ---------- scan ----------
async function doScan() {
  await api('/api/scan', { method: 'POST' }).catch(oops);
  pollScan();
}
async function pollScan() {
  SCAN = await api('/api/scan/status').catch(() => ({ running: false }));
  if (!CURID) paintDash();
  if (SCAN.running) setTimeout(pollScan, 1000);
  else if (!CURID) { await loadMovies(); paintHomeBody(); }
}

// ---------- junk ----------
async function doCleanupJunk() {
  const p = await api('/api/junk/preview').catch(e => { oops(e); return null; });
  if (!p) return;
  if (!p.total) { toast('No junk files found.'); return; }
  const list = Object.entries(p.folders).flatMap(([folder, files]) =>
    files.map(f => `${folder === '__top_level__' ? '' : folder + '/'}${f}`));
  const ok = await modal({
    title: `Purge ${p.total} junk file(s)`, danger: true, mode: 'hold', confirmLabel: 'Hold to purge',
    html: `These files will be permanently deleted:<div class="files">${list.map(esc).join('\n')}</div>`,
  });
  if (!ok) return;
  const r = await api('/api/junk/apply', { method: 'POST' }).catch(oops);
  if (r) toast(`Removed ${r.removed} junk file(s).${r.errors.length ? ' ' + r.errors.length + ' error(s).' : ''}`);
}

// ---------- jobs polling ----------
async function pollJobs() {
  JOBS = await api('/api/jobs').catch(() => JOBS);
  if (!CURID) paintDash();
  else paintDetailJob();
}

// ---------- detail ----------
async function renderDetail(id) {
  const page = document.getElementById('page');
  page.innerHTML = '<div class="dwrap"><div class="skel" style="height:60px;margin:20px 22px"></div><div class="skel" style="height:180px;margin:20px 22px"></div></div>';
  const data = await api(`/api/movies/${id}`).catch(e => { page.innerHTML = `<div class="empty">${esc(e.message)}</div>`; throw e; });
  const m = data.movie;
  SAMPLES = await api(`/api/movies/${id}/samples`).catch(() => []);
  TRACKSTATE = {
    audio: data.tracks.filter(t => t.type === 'audio').map(t => ({ ...t })),
    subs: data.tracks.filter(t => t.type === 'subtitle').map(t => ({ ...t })),
  };
  const video = data.tracks.find(t => t.type === 'video');
  VIDEOTRACK = video;
  const title = m.title || m.clean_title || m.folder;

  const safeStd = m.title && m.year ? `${m.title} (${m.year})`.replace(/[<>:"/\\|?*]/g, '').trim() : null;
  const running = INFLIGHT.includes(m.status);
  const configured = ['ready', 'cleaning', 'encoding', 'working', 'clean', 'error'].includes(m.status);
  const s1 = m.tmdb_id ? 'done' : 'active';
  const s2 = s1 !== 'done' ? 'pending' : (configured ? 'done' : 'active');
  const s3 = m.status === 'clean' ? 'done' : (running || s2 === 'done' ? 'active' : 'pending');
  const finalized = m.status === 'clean' && !m.output_file && m.folder === safeStd && m.file && m.file.startsWith(safeStd);
  const s4 = s3 !== 'done' ? 'pending' : (finalized ? 'done' : 'active');

  const STMAP = { unprocessed: ['NEW', 'var(--mut)'], ready: ['READY', 'var(--fine)'], cleaning: ['REMUXING', 'var(--acc)'],
    encoding: ['ENCODING', 'var(--acc)'], working: ['WORKING', 'var(--acc)'], clean: ['CLEAN', 'var(--fine)'],
    stub: ['STUB', 'var(--mut)'], error: ['ERROR', 'var(--err)'] };
  const [stL, stC] = STMAP[m.status] || STMAP.unprocessed;
  const poster = posterUrl(m.poster_path);
  const shrink = m.advice === 'encode';
  const mbps = m.bitrate ? (m.bitrate / 1e6) : null;
  const bar = barFor(m);

  // default RF selection: recommended sample, else 22
  SELRF = recommendedRF(m) ?? (SAMPLES.length ? SAMPLES[Math.floor(SAMPLES.length / 2)].rf : 22);

  page.innerHTML = `<div class="dwrap">
    <div class="dtop">
      <span class="back" onclick="location.hash=''">← Library</span>
      <span class="stpill" style="color:${stC}"><span class="dot ${stC.includes('fine') ? 'g-fine-dot' : ''}" style="background:${stC}"></span>${stL}</span>
    </div>
    <div class="ident">
      ${poster ? `<img src="${poster}">` : '<div class="noposter">POSTER</div>'}
      <div style="min-width:0">
        <h2>${esc(title)} ${m.year ? `<span class="yr">(${m.year})</span>` : ''}</h2>
        <div class="fn">${esc(m.file || m.folder)}</div>
        <div class="spec-chips">
          ${m.width ? `<span class="schip">${m.width}×${m.height}</span>` : ''}
          ${m.video_codec ? `<span class="schip">${esc(m.video_codec.toUpperCase())}</span>` : ''}
          ${m.hdr && m.hdr !== 'SDR' ? `<span class="schip acc">${esc(m.hdr)}</span>` : ''}
          ${mbps ? `<span class="schip ${mbps > bar ? 'shr' : ''}">${mbps.toFixed(0)} Mbps</span>` : ''}
          ${m.size_bytes ? `<span class="schip ${shrink ? 'shr' : ''}">${fmtG(m.size_bytes)}</span>` : ''}
          ${m.original_language ? `<span class="schip">orig: ${esc(m.original_language)}</span>` : ''}
        </div>
        ${data.duplicates.length ? `<div class="duprow">${data.duplicates.length} duplicate${data.duplicates.length > 1 ? 's' : ''}: ${data.duplicates.map(d => `<a onclick="location.hash='#/movie/${d.id}'">${esc(d.folder)}</a>`).join(', ')}</div>` : ''}
      </div>
    </div>
    <div class="steps">
      ${stepCard(1, s1, 'Match on TMDB',
        m.tmdb_id ? `${esc(m.title)} (${m.year}) · tmdb ${m.tmdb_id}` : 'find the canonical title',
        s1 === 'done' ? 'Re-match' : null, `
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <input id="tmdbQ" placeholder="Search TMDB…" style="width:240px" value="${esc(m.clean_title || '')}">
          <button class="btn" onclick="tmdbSearch(${id})">Search</button>
        </div><div id="tmdbResults"></div>`)}
      ${stepCard(2, s2, 'Configure tracks',
        `${TRACKSTATE.audio.length + TRACKSTATE.subs.length + 1} tracks → ${1 + [...TRACKSTATE.audio, ...TRACKSTATE.subs].filter(t => t.keep).length} kept`,
        s2 === 'done' ? '▾ reopen' : null,
        `<div id="tracksbox">${tracksHtml(video)}</div>`)}
      ${stepCard(3, s3, 'Process', s3 === 'done' ? 'output verified' : running ? 'job running…' : 'pick a route, then commit', null,
        `<div id="step3body">${step3Html(m, running)}</div>`, s3 === 'active')}
      ${stepCard(4, s4, 'Finalize',
        finalized ? 'all done — clean and standard-named' : `delete original + rename to “${esc(safeStd || 'Title (Year)')}” · typed confirmation`,
        null, `
        <div class="btnrow" style="margin:0">
          <button class="btn danger" onclick="doFinalize(${id}, '${esc(title)}')" ${s4 === 'active' ? '' : 'disabled'}>Delete original…</button>
          <button class="btn" onclick="doRename(${id})" ${m.tmdb_id ? '' : 'disabled'}>Rename only (keep original)</button>
        </div>`)}
    </div></div>`;
  document.querySelectorAll('.stepc.done .step-head').forEach(h =>
    h.onclick = e => { if (e.target.closest('input,button,select')) return; h.parentElement.classList.toggle('open'); });
  window._m = m;
  if (running) watchMovieJob(id);
}

function stepCard(n, state, title, summary, action, body, glowIt) {
  return `<div class="stepc ${state} ${glowIt ? 'g-acc-panel' : ''}" id="step${n}">
    <div class="step-head">
      <span class="disc ${state === 'active' ? 'g-acc' : ''}">${state === 'done' ? '✓' : n}</span>
      <span class="st">${title}</span>
      <span class="ssum">${summary}</span>
      ${action ? `<span class="sact">${action}</span>` : ''}
    </div>
    <div class="step-body">${body}</div>
  </div>`;
}

// ---------- step 2: tracks ----------
function tracksHtml(video) {
  const grp = (label, list, type) => `
    <div class="lbl" style="margin-top:${type === 'subs' ? '12px' : '0'}">${label}</div>
    ${list.map((t, i) => trackRowHtml(t, i, type, list.length)).join('') || '<div style="color:var(--faint);font-size:12px;padding:6px 0">none</div>'}`;
  return `
    ${video ? `<div class="lbl">VIDEO</div><div class="trow"><div class="cinfo" style="width:auto"><span class="cc">${esc(video.codec || '')}</span></div><span style="font:10px var(--mono);color:var(--faint)">always kept</span></div>` : ''}
    ${grp('AUDIO — TOP = PRIMARY', TRACKSTATE.audio, 'audio')}
    ${grp('SUBTITLES', TRACKSTATE.subs, 'subs')}
    <div class="btnrow">
      <button class="btn" onclick="callSuggest(${CURID})">Auto-suggest</button>
      <button class="btn" onclick="callStrip(${CURID})">Strip junk names</button>
      <button class="btn primary g-acc-lg" onclick="saveConfig(${CURID})">Save configuration</button>
    </div>`;
}
function trackRowHtml(t, i, type, n) {
  const meta = [t.channels ? t.channels + 'ch' : null, t.lang, t.forced_flag ? 'forced-src' : null, t.ext_path ? 'ext' : null].filter(Boolean).join(' · ');
  const langs = ['eng', 'spa', 'und', t.out_lang].filter((v, ix, a) => v && a.indexOf(v) === ix);
  return `<div class="trow ${t.keep ? '' : 'drop'}">
    <div class="updown">
      <button onclick="moveTrack('${type}',${i},-1)" ${i === 0 ? 'disabled' : ''}>▲</button>
      <button onclick="moveTrack('${type}',${i},1)" ${i === n - 1 ? 'disabled' : ''}>▼</button>
    </div>
    <button class="keep-pill ${t.keep ? 'on' : 'off'}" onclick="toggleKeep('${type}',${i})">${t.keep ? 'KEEP' : 'DROP'}</button>
    <div class="cinfo"><div class="cc">${esc(t.codec || '')}</div><div class="cm">${esc(meta)}</div></div>
    <select class="lang" ${t.keep ? '' : 'disabled'} onchange="TRACKSTATE.${type}[${i}].out_lang=this.value">
      ${langs.map(l => `<option value="${l}" ${t.out_lang === l ? 'selected' : ''}>${l}</option>`).join('')}</select>
    <button class="fchip def ${t.keep && t.out_default ? '' : 'dim'}" onclick="toggleDefault('${type}',${i})">DEFAULT</button>
    ${type === 'subs' ? `<button class="fchip forc ${t.keep && t.out_forced ? '' : 'dim'}" onclick="toggleForced(${i})">FORCED</button>` : ''}
    <input class="nm" ${t.keep ? '' : 'disabled'} value="${esc(t.out_name || '')}" placeholder="track name (empty = none)"
      oninput="TRACKSTATE.${type}[${i}].out_name=this.value">
  </div>`;
}
function repaintTracks() {
  const box = document.getElementById('tracksbox');
  if (box) box.innerHTML = tracksHtml(VIDEOTRACK);
}
function moveTrack(type, i, d) {
  const l = TRACKSTATE[type];
  const j = i + d;
  if (j < 0 || j >= l.length) return;
  [l[i], l[j]] = [l[j], l[i]];
  repaintTracks();
}
function toggleKeep(type, i) {
  const t = TRACKSTATE[type][i];
  t.keep = t.keep ? 0 : 1;
  if (!t.keep) { t.out_default = 0; t.out_forced = 0; }
  repaintTracks();
}
function toggleDefault(type, i) {
  const l = TRACKSTATE[type];
  if (!l[i].keep) return;
  const was = l[i].out_default;
  l.forEach(t => t.out_default = 0);   // one default per group
  l[i].out_default = was ? 0 : 1;
  repaintTracks();
}
function toggleForced(i) {
  const t = TRACKSTATE.subs[i];
  if (!t.keep) return;
  t.out_forced = t.out_forced ? 0 : 1;
  repaintTracks();
}
async function saveConfig(id) {
  const withOrder = l => l.map((t, i) => ({ id: t.id, keep: t.keep ? 1 : 0, out_order: i, out_lang: t.out_lang || '',
    out_default: t.out_default ? 1 : 0, out_forced: t.out_forced ? 1 : 0, out_name: t.out_name || '' }));
  await api(`/api/movies/${id}/config`, { method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ tracks: [...withOrder(TRACKSTATE.audio), ...withOrder(TRACKSTATE.subs)] }) }).catch(oops);
  renderDetail(id);
}
async function callSuggest(id) { await api(`/api/movies/${id}/suggest`, { method: 'POST' }).catch(oops); renderDetail(id); }
async function callStrip(id) { await api(`/api/movies/${id}/strip-names`, { method: 'POST' }).catch(oops); renderDetail(id); }

// ---------- step 3: process ----------
function tagForRF(rf) { return rf <= 18 ? 'NEAR-LOSSLESS' : rf <= 21 ? 'EXCELLENT' : rf <= 23 ? 'SWEET SPOT' : 'QUALITY RISK'; }
function recommendedRF(m) {
  // lowest RF (best quality) whose projected full size lands under the advice bar
  if (!SAMPLES.length || !m.duration) return null;
  const barBits = barFor(m) * 1e6;
  const ok = SAMPLES.filter(s => s.est_full_bytes && (s.est_full_bytes * 8 / m.duration) <= barBits)
                    .sort((a, b) => a.rf - b.rf);
  return ok.length ? ok[0].rf : null;
}
function step3Html(m, running) {
  if (running) return jobProgressHtml() || '<div class="jprog"><div class="row">job starting…</div></div>';
  const shrink = m.advice === 'encode';
  const mbps = m.bitrate ? Math.round(m.bitrate / 1e6) : null;
  const bar = barFor(m);
  const res = resOf(m);
  const banner = m.advice ? (shrink
    ? `<div class="advbanner shrink"><b class="s">SHRINK ADVISED</b><span>${mbps} Mbps is above the ${bar} Mbps bar for ${res} — a heavy encode should reclaim ~${Math.round((m.size_bytes || 0) * 0.72 / 1e9)} GB with no visible loss.</span></div>`
    : `<div class="advbanner fine"><b class="f">QUALITY FINE</b><span>${mbps ?? '?'} Mbps is at or under the ${bar} Mbps bar for ${res} — accept as-is, or quick-remux if the tracks need cleanup.</span></div>`) : '';
  const selSample = SAMPLES.find(s => s.rf === SELRF);
  const est = selSample && selSample.est_full_bytes ? ` · est ~${fmtG(selSample.est_full_bytes)}` : '';
  return `${banner}
    <div class="btnrow" style="margin-top:12px">
      <button class="btn gold ${shrink ? 'g-shr' : ''}" onclick="runJob(${m.id}, 'encode')">Heavy Encode @ RF <span id="encRf">${SELRF}</span><span id="encEst">${est}</span></button>
      <button class="btn ghost2" onclick="runJob(${m.id}, 'remux')">Quick Remux <span style="color:var(--faint);font-weight:400">(minutes)</span></button>
      <button class="btn fine" onclick="acceptAsIs(${m.id}, '${esc(m.title || m.clean_title || '')}')">Accept as-is</button>
      <span class="linky" onclick="previewCmd(${m.id})">view command ›</span>
    </div>
    <pre class="cmd" id="cmdPreview" style="display:none"></pre>
    ${rfChartHtml(m)}
    <div id="jobStatus"></div>`;
}
function rfChartHtml(m) {
  const src = m.size_bytes;
  const sorted = [...SAMPLES].sort((a, b) => a.rf - b.rf);
  const rec = recommendedRF(m);
  const maxEst = Math.max(...sorted.map(s => s.est_full_bytes || 0), 1);
  const cols = sorted.map(s => {
    const h = Math.max(10, Math.round(86 * (s.est_full_bytes || 0) / maxEst));
    const isRec = s.rf === rec, isSel = s.rf === SELRF;
    return { s, h, isRec, isSel };
  });
  return `<div class="rfpanel">
    <div class="rfhead">
      <span class="lbl">RF DECISION — PROJECTED FULL SIZE FROM 30s SAMPLES</span>
      <span class="src">source ${fmtG(src)}</span>
      <input type="number" id="rfInput" value="${SELRF}" min="14" max="32" title="RF for the next sample / encode" onchange="SELRF=parseInt(this.value)||22;syncEncodeBtn()">
      <button class="btn" style="color:var(--acc);border-color:var(--accBd);font-weight:600;font-size:11px" onclick="runSample(${m.id})">+ Encode sample</button>
    </div>
    ${cols.length ? `
    <div class="rfcols">${cols.map(c => `
      <div class="rfcol ${c.isRec ? 'rec' : ''} ${c.isSel ? 'sel' : ''}" onclick="selectRF(${c.s.rf})">
        ${c.isRec ? '<div class="recl g-txt-fine">RECOMMENDED</div>' : ''}
        <div class="sz">${fmtG(c.s.est_full_bytes)}</div>
        <div class="pct">${src && c.s.est_full_bytes ? Math.round(100 * c.s.est_full_bytes / src) + '%' : '?'} of source</div>
        <div class="bar ${c.isRec ? 'g-fine' : ''}" style="height:${c.h}px"></div>
      </div>`).join('')}
    </div>
    <div class="rflabels">${cols.map(c => `
      <div class="rflab ${c.isRec ? 'rec' : ''}">
        <div class="rf">RF ${c.s.rf}</div>
        <div class="tag">${tagForRF(c.s.rf)}</div>
        <div class="lnk"><a href="/api/movies/${m.id}/samples/file?file=${encodeURIComponent(c.s.file)}" target="_blank">▶ play</a> · <span class="x" onclick="delSample(${m.id},'${encodeURIComponent(c.s.file)}')">✕</span></div>
      </div>`).join('')}
    </div>
    <div class="qaxis"></div>
    <div class="qlbl"><span>← HIGHER QUALITY · BIGGER FILE</span><span>SMALLER FILE · QUALITY RISK →</span></div>`
    : '<div class="empty" style="padding:20px">NO SAMPLES YET — ENCODE ONE TO COMPARE SIZES BEFORE COMMITTING</div>'}
  </div>`;
}
function selectRF(rf) { SELRF = rf; const i = document.getElementById('rfInput'); if (i) i.value = rf; refreshStep3(); }
function syncEncodeBtn() { refreshStep3(); }
function refreshStep3() {
  const el = document.getElementById('step3body');
  if (el && window._m) el.innerHTML = step3Html(window._m, INFLIGHT.includes(window._m.status));
}

async function previewCmd(id) {
  const kind = window._m && window._m.advice === 'keep' ? 'remux' : 'encode';
  const r = await api(`/api/movies/${id}/command?kind=${kind}&quality=${SELRF}`).catch(e => { oops(e); throw e; });
  const pre = document.getElementById('cmdPreview');
  pre.style.display = 'block';
  pre.textContent = r.cmd;
}

async function runJob(id, kind) {
  const est = SAMPLES.find(s => s.rf === SELRF)?.est_full_bytes;
  const ok = await modal({
    title: kind === 'encode' ? `Heavy Encode @ RF ${SELRF}` : 'Quick Remux',
    html: kind === 'encode'
      ? `x265 10-bit re-encode — hours to days of CPU time.${est ? `<br>Projected output: <b>${fmtG(est)}</b> (source ${fmtG(window._m?.size_bytes)}).` : ''}<br>Source file is not touched; output lands next to it.`
      : 'mkvmerge repackage with your kept tracks — minutes, no quality change. Source file is not touched.',
    confirmLabel: kind === 'encode' ? 'Start encode' : 'Start remux', mode: 'plain',
  });
  if (!ok) return;
  const r = await api(`/api/movies/${id}/jobs`, { method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ kind, quality: SELRF }) }).catch(e => { oops(e); throw e; });
  renderDetail(id);
  watchJob(r.job_id, id);
}
async function runSample(id) {
  const r = await api(`/api/movies/${id}/jobs`, { method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ kind: 'sample', quality: SELRF }) }).catch(e => { oops(e); throw e; });
  toast(`Sample @ RF ${SELRF} started — lands in the chart when done.`);
  watchJob(r.job_id, id);
}
async function delSample(id, fileArg) {
  await api(`/api/movies/${id}/samples?file=${fileArg}`, { method: 'DELETE' }).catch(oops);
  SAMPLES = await api(`/api/movies/${id}/samples`).catch(() => []);
  refreshStep3();
}
async function acceptAsIs(id, title) {
  const ok = await modal({
    title: 'Accept as-is', mode: 'hold', confirmLabel: 'Hold to accept',
    html: `Mark <b>${esc(title)}</b> as final. No re-encode — current quality and size are kept, and it leaves the triage queue.`,
  });
  if (!ok) return;
  await api(`/api/movies/${id}/accept`, { method: 'POST' }).catch(oops);
  renderDetail(id);
}

// ---------- job watching ----------
function jobProgressHtml() {
  const j = JOBS.find(x => x.movie_id === CURID && (x.status === 'running' || x.status === 'queued'));
  if (!j) return '';
  if (j.status === 'queued') return `<div class="jprog"><div class="row" style="color:var(--faint)">QUEUED — waiting for the runner</div></div>`;
  return `<div class="jprog">
    <div class="row">${esc(KIND_LABEL[j.kind] || j.kind).toUpperCase()} · ${(j.progress || 0).toFixed(1)}%
      ${j.eta ? `<span class="eta">ETA ${esc(j.eta.toUpperCase())}</span>` : ''}</div>
    <div class="bar"><div class="g-acc" style="width:${j.progress || 0}%"></div></div></div>`;
}
function paintDetailJob() {
  if (!CURID || !window._m || !INFLIGHT.includes(window._m.status)) return;
  const el = document.getElementById('step3body');
  if (el) { const h = jobProgressHtml(); if (h) el.innerHTML = h; }
}
async function watchJob(jobId, movieId) {
  const j = await api(`/api/jobs/${jobId}`).catch(() => null);
  if (!j) return;
  if (j.status === 'running' || j.status === 'queued') {
    setTimeout(() => watchJob(jobId, movieId), 3000);
  } else if (location.hash === `#/movie/${movieId}`) {
    if (j.kind === 'sample') { SAMPLES = await api(`/api/movies/${movieId}/samples`).catch(() => []); refreshStep3(); }
    else renderDetail(movieId);
  }
}
async function watchMovieJob(id) {
  const mine = JOBS.filter(j => j.movie_id === id).sort((a, b) => b.id - a.id);
  if (mine.length) watchJob(mine[0].id, id);
}

// ---------- finalize / rename / tmdb ----------
async function doFinalize(id, title) {
  const m = window._m || {};
  const ok = await modal({
    title: 'Delete original', danger: true, mode: 'typed', expect: title, confirmLabel: 'Delete original',
    html: `This permanently deletes the original source file${m.size_bytes ? ` (<b>${fmtG(m.size_bytes)}</b>)` : ''} and renames everything to “${esc(title)}${m.year ? ` (${m.year})` : ''}”.<br>
      <b>Kept:</b> the verified job output.<br><b>Deleted:</b> original video, replaced external subs, leftover junk.<br>
      This cannot be undone. Type the movie title to confirm:`,
  });
  if (!ok) return;
  try { await api(`/api/movies/${id}/delete-original`, { method: 'POST' }); }
  catch (e) { oops(e); return; }
  await api(`/api/movies/${id}/rename`, { method: 'POST' }).catch(oops);
  api('/api/stats').then(s => { STATS = s; }).catch(() => {});
  renderDetail(id);
}
async function doRename(id) {
  await api(`/api/movies/${id}/rename`, { method: 'POST' }).catch(e => { oops(e); throw e; });
  renderDetail(id);
}
async function tmdbSearch(id) {
  const q = document.getElementById('tmdbQ').value;
  const results = await api(`/api/tmdb/search?q=${encodeURIComponent(q)}`).catch(e => { oops(e); return []; });
  document.getElementById('tmdbResults').innerHTML = results.map(r => `
    <div class="cand" onclick="pickTmdb(${id}, ${r.tmdb_id})">
      ${r.poster_path ? `<img src="${posterUrl(r.poster_path)}">` : ''}
      <span>${esc(r.title)} (${r.year || '?'}) <span class="cl">${esc(r.original_language || '')}</span></span>
    </div>`).join('') || '<div class="empty" style="padding:14px">NO RESULTS</div>';
}
async function pickTmdb(id, tmdbId) {
  await api(`/api/movies/${id}/tmdb`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ tmdb_id: tmdbId }) }).catch(oops);
  renderDetail(id);
}
</script>
</body>
